# Local dev backing services (HANDOFF D16). App runs with `npm run dev` on the host.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workhub
      POSTGRES_PASSWORD: workhub
      POSTGRES_DB: workhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workhub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workhub
      MINIO_ROOT_PASSWORD: workhub-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
